<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <pattern id="stars" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#60a5fa" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="200" height="300" fill="url(#bg)"/>
  <rect width="200" height="300" fill="url(#stars)"/>
  <rect x="10" y="10" width="180" height="280" fill="none" stroke="#60a5fa" stroke-width="2" rx="10"/>
  <text x="100" y="140" text-anchor="middle" fill="#60a5fa" font-size="16" font-family="Georgia">✦</text>
  <text x="100" y="170" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Georgia">Tarot</text>
</svg>